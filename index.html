<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Settlement Upload</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --green: #00B900; --red: #e53935; --gray-bg: #f2f2f7; --gray-border: #d1d1d6; --gray-text: #8e8e93; --text: #1c1c1e; --white: #ffffff; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Sarabun', sans-serif; background: var(--gray-bg); color: var(--text); }
    .screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: var(--green); padding: 20px 20px 44px; color: white; flex-shrink: 0; }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header-icon { font-size: 26px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .date { font-size: 13px; opacity: 0.85; }
    .body { flex: 1; margin-top: -24px; background: var(--gray-bg); border-radius: 24px 24px 0 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 16px 32px; display: flex; flex-direction: column; gap: 12px; }
    .user-card { background: var(--white); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #00B900, #00d900); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .user-name { font-size: 15px; font-weight: 600; }
    .user-label { font-size: 12px; color: var(--gray-text); margin-top: 1px; }
    .section-card { background: var(--white); border-radius: 14px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .section-title { font-size: 12px; font-weight: 600; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .preview { width: 100%; height: 160px; border: 2px dashed var(--gray-border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: var(--gray-bg); overflow: hidden; }
    .preview.has-image { border: 2px solid var(--green); }
    .preview:active { opacity: 0.8; }
    .preview img#preview-img { width: 100%; height: 100%; object-fit: cover; }
    .preview-placeholder { text-align: center; }
    .preview-placeholder .icon { font-size: 32px; opacity: 0.35; display: block; margin-bottom: 6px; }
    .preview-placeholder p { font-size: 14px; color: var(--gray-text); font-weight: 500; }
    .preview-placeholder small { font-size: 11px; color: var(--gray-border); }
    input[type="file"] { display: none; }
    .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; font-family: 'Sarabun', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.15s, opacity 0.15s; }
    .btn:active { transform: scale(0.97); opacity: 0.88; }
    .btn-upload { background: var(--green); color: white; box-shadow: 0 4px 14px rgba(0,185,0,0.3); }
    .btn-upload:disabled { background: var(--gray-border); color: var(--gray-text); box-shadow: none; cursor: not-allowed; }
    .btn-none { background: white; color: var(--red); border: 1.5px solid var(--red); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .status { text-align: center; font-size: 14px; font-weight: 500; padding: 12px 16px; border-radius: 12px; display: none; }
    .status.show { display: block; }
    .status.error { background: #fff0f0; color: var(--red); }
    .status.success { background: #f0fff0; color: var(--green); }
    .status.loading { background: var(--gray-bg); color: var(--gray-text); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .overlay.show { display: flex; }
    .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.25); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .overlay p { color: white; font-size: 15px; font-weight: 600; font-family: 'Sarabun', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <div class="header-top">
      <div class="header-icon">📋</div>
      <h1>Settlement ประจำวัน</h1>
    </div>
    <div class="date" id="date-label"></div>
  </div>
  <div class="body">
    <div class="user-card" id="user-card" style="display:none">
      <div class="user-avatar">👤</div>
      <div>
        <div class="user-name" id="user-name">กำลังโหลด...</div>
        <div class="user-label">ผู้ส่ง Settlement</div>
      </div>
    </div>
    <div class="section-card">
      <div class="section-title">📸 แนบรูป Settlement</div>
      <div class="preview" id="preview" onclick="document.getElementById('fileInput').click()">
        <div class="preview-placeholder" id="preview-placeholder">
          <span class="icon">🖼️</span>
          <p>แตะเพื่อเลือกรูป</p>
          <small>JPG, PNG ไม่เกิน 10MB</small>
        </div>
        <img id="preview-img" style="display:none"/>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
    </div>
    <button class="btn btn-upload" id="btn-upload" disabled onclick="uploadImage()">📸 ส่ง Settlement</button>
    <button class="btn btn-none" onclick="confirmNoSettlement()">❌ ไม่มี Settlement วันนี้</button>
    <div class="status" id="status"></div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p id="overlay-text">กำลังส่งข้อมูล...</p>
</div>

<script>
  const LIFF_ID = '2010146725-QLSYqG3m';
  const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzo93qMu3K3xZI2ncpqG4fqGM_HURUS4DYFue_7aayzf-BA-LbihpSqBSU2QTwB3Vbx/exec';

  let selectedFile = null;
  let groupId = null;
  let userId = null;
  let displayName = null;

  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function fixSize() {
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    document.querySelector('.screen').style.cssText = `width:${vw}px;height:${vh}px`;
    document.documentElement.style.cssText = `width:${vw}px;height:${vh}px`;
    document.body.style.cssText = `width:${vw}px;height:${vh}px`;
  }
  fixSize();
  window.addEventListener('resize', fixSize);

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isInClient()) { setStatus('❌ กรุณาเปิดในแอป LINE เท่านั้น', 'error'); return; }
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      userId = profile.userId;
      displayName = profile.displayName;
      const urlParams = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));
      const ctx = liff.getContext();
      groupId = urlParams.get('groupId') || hashParams.get('groupId') || ctx?.groupId || null;
      document.getElementById('user-name').textContent = displayName;
      document.getElementById('user-card').style.display = 'flex';
      if (!groupId) setStatus('❌ ไม่พบข้อมูลกลุ่ม กรุณากดปุ่มจาก LINE ที่ Bot ส่งมาเท่านั้น', 'error');
    } catch(err) {
      setStatus('❌ ' + err.message, 'error');
    }
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { setStatus('❌ ไฟล์ใหญ่เกิน 10MB', 'error'); return; }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('preview-img').style.display = 'block';
      document.getElementById('preview-placeholder').style.display = 'none';
      document.getElementById('preview').classList.add('has-image');
      document.getElementById('btn-upload').disabled = false;
      setStatus('', '');
    };
    reader.readAsDataURL(file);
  }

  function compressImage(file, maxWidth, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ส่ง GET request ผ่าน Image tag — ไม่ติด CORS เลย
  function pingUrl(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = img.onerror = () => resolve();
      img.src = url + '&_=' + Date.now();
    });
  }

  async function uploadImage() {
    if (!selectedFile) return;
    showOverlay('กำลังย่อรูป...');
    document.getElementById('btn-upload').disabled = true;

    try {
      const compressedBase64 = await compressImage(selectedFile, 1200, 0.6);
      const chunkSize = 50000;
      const chunks = [];
      for (let i = 0; i < compressedBase64.length; i += chunkSize) {
        chunks.push(compressedBase64.substring(i, i + chunkSize));
      }

      for (let i = 0; i < chunks.length; i++) {
        showOverlay(`กำลังส่ง ${i + 1}/${chunks.length}...`);
        const url = new URL(WEBAPP_URL);
        url.searchParams.set('action', 'uploadChunk');
        url.searchParams.set('groupId', groupId || '');
        url.searchParams.set('displayName', encodeURIComponent(displayName || ''));
        url.searchParams.set('chunk', chunks[i]);
        url.searchParams.set('chunkIndex', i);
        url.searchParams.set('totalChunks', chunks.length);
        await pingUrl(url.toString());
        // รอเล็กน้อยระหว่าง chunk
        await new Promise(r => setTimeout(r, 300));
      }

      hideOverlay();
      setStatus('✅ ส่ง Settlement สำเร็จแล้วครับ', 'success');
      setTimeout(() => liff.closeWindow(), 2000);
    } catch(err) {
      hideOverlay();
      setStatus('❌ ' + err.message, 'error');
      document.getElementById('btn-upload').disabled = false;
    }
  }

  async function confirmNoSettlement() {
    if (!confirm('ยืนยันว่าไม่มี Settlement วันนี้?')) return;
    showOverlay('กำลังบันทึก...');
    try {
      const url = new URL(WEBAPP_URL);
      url.searchParams.set('action', 'noSettlement');
      url.searchParams.set('groupId', groupId || '');
      url.searchParams.set('userId', userId || '');
      url.searchParams.set('displayName', encodeURIComponent(displayName || ''));
      await pingUrl(url.toString());
      hideOverlay();
      setStatus('✅ บันทึกแล้วครับ ไม่มี Settlement วันนี้', 'success');
      setTimeout(() => liff.closeWindow(), 2000);
    } catch(err) {
      hideOverlay();
      setStatus('❌ เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (msg ? ' show ' + type : '');
  }
  function showOverlay(text) {
    document.getElementById('overlay-text').textContent = text;
    document.getElementById('overlay').classList.add('show');
  }
  function hideOverlay() {
    document.getElementById('overlay').classList.remove('show');
  }

  init();
</script>
</body>
</html>
