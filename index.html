<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Settlement Upload</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --green: #00B900; --red: #e53935; --gray-bg: #f2f2f7; --gray-border: #d1d1d6; --gray-text: #8e8e93; --text: #1c1c1e; --white: #ffffff; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Sarabun', sans-serif; background: var(--gray-bg); color: var(--text); }
    .screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: var(--green); padding: 20px 20px 44px; color: white; flex-shrink: 0; }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header-icon { font-size: 26px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .date { font-size: 13px; opacity: 0.85; }
    .header .branch-name { font-size: 13px; opacity: 0.95; font-weight: 600; margin-top: 2px; }
    .body { flex: 1; margin-top: -24px; background: var(--gray-bg); border-radius: 24px 24px 0 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 16px 32px; display: flex; flex-direction: column; gap: 12px; }
    .user-card { background: var(--white); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #00B900, #00d900); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; color: white;}
    .user-avatar.loading { background: var(--gray-border); }
    .user-name { font-size: 15px; font-weight: 600; }
    .user-name.loading { color: var(--gray-text); font-style: italic; }
    .user-label { font-size: 12px; color: var(--gray-text); margin-top: 1px; }
    .section-card { background: var(--white); border-radius: 14px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .section-title { font-size: 12px; font-weight: 600; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .preview { width: 100%; height: 160px; border: 2px dashed var(--gray-border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: var(--gray-bg); overflow: hidden; }
    .preview.has-image { border: 2px solid var(--green); }
    .preview:active { opacity: 0.8; }
    .preview img#preview-img { width: 100%; height: 100%; object-fit: cover; }
    .preview-placeholder { text-align: center; }
    .preview-placeholder .icon { font-size: 32px; opacity: 0.35; display: block; margin-bottom: 6px; }
    .preview-placeholder p { font-size: 14px; color: var(--gray-text); font-weight: 500; }
    .preview-placeholder small { font-size: 11px; color: var(--gray-border); }
    input[type="file"] { display: none; }
    .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; font-family: 'Sarabun', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.15s, opacity 0.15s; }
    .btn:active:not(:disabled) { transform: scale(0.97); opacity: 0.88; }
    .btn-upload { background: var(--green); color: white; box-shadow: 0 4px 14px rgba(0,185,0,0.3); }
    .btn-upload:disabled { background: var(--gray-border); color: var(--white); box-shadow: none; cursor: not-allowed; }
    .btn-none { background: white; color: var(--red); border: 1.5px solid var(--red); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .btn-none:disabled { border-color: var(--gray-border); color: var(--gray-text); background: var(--gray-bg); box-shadow: none; cursor: not-allowed; }
    .status { text-align: center; font-size: 14px; font-weight: 500; padding: 12px 16px; border-radius: 12px; display: none; }
    .status.show { display: block; }
    .status.error { background: #fff0f0; color: var(--red); }
    .status.success { background: #f0fff0; color: var(--green); }
    .status.loading { background: var(--gray-bg); color: var(--gray-text); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .overlay.show { display: flex; }
    .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.25); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .overlay p { color: white; font-size: 15px; font-weight: 600; font-family: 'Sarabun', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .setup-list { display: flex; flex-direction: column; gap: 8px; }
    .setup-item { background: var(--white); border: 1.5px solid var(--gray-border); border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: left; }
    .setup-item:active { background: var(--gray-bg); }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <div class="header-top">
      <div class="header-icon">📋</div>
      <h1>Settlement ประจำวัน</h1>
    </div>
    <div class="date" id="date-label"></div>
    <div class="branch-name" id="branch-label"></div>
  </div>
  <div class="body" id="body-content">
    <div class="user-card" id="user-card">
      <div class="user-avatar loading" id="user-avatar">⏳</div>
      <div>
        <div class="user-name loading" id="user-name">กำลังตรวจสอบกลุ่ม...</div>
        <div class="user-label">ผู้ส่ง Settlement</div>
      </div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p id="overlay-text">กำลังส่งข้อมูล...</p>
</div>

<script>
  const LIFF_ID = '2010146725-QLSYqG3m';
  // WEBAPP_URL คือ Web App เดียวกันของ Code.gs
  const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwlK31cgpt-Gd897sA6nR-rgISiJCws7w1v8dNsSD-HYgUUs34TCS1FC65mNoWEo_8B/exec';

  let selectedFile = null;
  let branchId = null;
  let groupId = null;
  let userId = null;
  let displayName = null;
  let isProfileLoaded = false;

  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function fixSize() {
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    document.querySelector('.screen').style.cssText = `width:${vw}px;height:${vh}px`;
    document.documentElement.style.cssText = `width:${vw}px;height:${vh}px`;
    document.body.style.cssText = `width:${vw}px;height:${vh}px`;
  }
  fixSize();
  window.addEventListener('resize', fixSize);

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isInClient()) { setBodyError('❌ กรุณาเปิดในแอป LINE เท่านั้น'); return; }
      if (!liff.isLoggedIn()) { liff.login(); return; }

      const profile = await liff.getProfile();
      userId = profile.userId;
      displayName = profile.displayName;

      // จุดสำคัญ: ดึง Group ID จาก context ของ LIFF เอง ไม่ต้องพึ่ง query string แล้ว
      const ctx = liff.getContext();
      groupId = ctx && ctx.groupId ? ctx.groupId : null;

      if (!groupId) {
        setBodyError('❌ กรุณาเปิดลิงก์นี้จากภายในกลุ่มไลน์ของสาขาคุณเท่านั้น (เปิดจากแชทส่วนตัวไม่ได้)');
        return;
      }

      // เช็คกับเซิร์ฟเวอร์ว่า Group ID นี้ผูกกับสาขาไหนไว้แล้วหรือยัง
      const res = await fetch(`${WEBAPP_URL}?action=resolveBranch&groupId=${encodeURIComponent(groupId)}`);
      const result = await res.json();

      if (result.matched) {
        branchId = result.branchId;
        renderUploadForm(result.branchName);
      } else {
        renderSetupScreen(result.unassignedBranches || []);
      }

    } catch(err) {
      setBodyError('❌ ' + err.message);
    }
  }

  // ===== หน้าตั้งค่าครั้งแรก (กลุ่มนี้ยังไม่เคยผูกกับสาขาไหน) =====
  function renderSetupScreen(branches) {
    document.getElementById('user-name').textContent = 'ตั้งค่าครั้งแรก';
    document.getElementById('user-name').classList.remove('loading');
    document.getElementById('user-avatar').textContent = '⚙️';
    document.getElementById('user-avatar').classList.remove('loading');

    const body = document.getElementById('body-content');
    if (!branches.length) {
      body.innerHTML += `<div class="section-card"><p>ไม่พบสาขาที่ยังไม่ได้ผูกกลุ่ม กรุณาติดต่อแอดมิน</p></div>`;
      return;
    }
    let html = `<div class="section-card">
      <div class="section-title">กลุ่มนี้ยังไม่เคยผูกกับสาขา — เลือกว่ากลุ่มนี้คือสาขาไหน (ทำครั้งเดียว)</div>
      <div class="setup-list" id="setup-list"></div>
    </div>`;
    body.insertAdjacentHTML('beforeend', html);
    const list = document.getElementById('setup-list');
    branches.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'setup-item';
      btn.textContent = b.branchName;
      btn.onclick = () => confirmRegister(b.branchId, b.branchName);
      list.appendChild(btn);
    });
  }

  async function confirmRegister(bId, bName) {
    if (!confirm(`ยืนยันผูกกลุ่มนี้กับสาขา "${bName}" ใช่หรือไม่?\nทำครั้งเดียวเท่านั้น หลังจากนี้จะไม่ถามอีก`)) return;
    showOverlay('กำลังบันทึก...');
    try {
      const body = new URLSearchParams({ action: 'registerGroup', groupId: groupId, branchId: bId });
      await fetch(WEBAPP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      });
      hideOverlay();
      branchId = bId;
      document.getElementById('body-content').innerHTML = `
        <div class="user-card">
          <div class="user-avatar">👤</div>
          <div>
            <div class="user-name">${displayName}</div>
            <div class="user-label">ผู้ส่ง Settlement</div>
          </div>
        </div>`;
      renderUploadForm(bName);
    } catch (err) {
      hideOverlay();
      setBodyError('❌ บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง');
    }
  }

  // ===== หน้าอัปโหลดปกติ (กลุ่มนี้ผูกกับสาขาแล้ว) =====
  function renderUploadForm(branchName) {
    document.getElementById('branch-label').textContent = 'สาขา: ' + branchName;
    document.getElementById('user-name').textContent = displayName;
    document.getElementById('user-name').classList.remove('loading');
    document.getElementById('user-avatar').textContent = '👤';
    document.getElementById('user-avatar').classList.remove('loading');

    const body = document.getElementById('body-content');
    const existingCards = body.querySelectorAll('.section-card, .btn, .status');
    existingCards.forEach(el => el.remove());

    body.insertAdjacentHTML('beforeend', `
      <div class="section-card">
        <div class="section-title">📸 แนบรูป Settlement</div>
        <div class="preview" id="preview" onclick="document.getElementById('fileInput').click()">
          <div class="preview-placeholder" id="preview-placeholder">
            <span class="icon">🖼️</span>
            <p>แตะเพื่อเลือกรูป</p>
            <small>JPG, PNG ไม่เกิน 10MB</small>
          </div>
          <img id="preview-img" style="display:none"/>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
      </div>
      <button class="btn btn-upload" id="btn-upload" onclick="uploadImage()">📸 ส่ง Settlement</button>
      <button class="btn btn-none" id="btn-none" onclick="confirmNoSettlement()">❌ ไม่มี Settlement วันนี้</button>
      <div class="status" id="status"></div>
    `);
    isProfileLoaded = true;
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { setStatus('❌ ไฟล์ใหญ่เกิน 10MB', 'error'); return; }

    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('preview-img').style.display = 'block';
      document.getElementById('preview-placeholder').style.display = 'none';
      document.getElementById('preview').classList.add('has-image');
      setStatus('', '');
    };
    reader.readAsDataURL(file);
  }

  function compressImage(file, maxWidth, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadImage() {
    if (!selectedFile || !isProfileLoaded) { setStatus('❌ กรุณาเลือกรูปก่อน', 'error'); return; }
    showOverlay('กำลังย่อรูป...');
    document.getElementById('btn-upload').disabled = true;
    try {
      const compressedBase64 = await compressImage(selectedFile, 800, 0.5);
      showOverlay('กำลังส่ง...');
      const body = new URLSearchParams({
        action: 'uploadChunk',
        branchId: branchId || '',
        displayName: displayName || '',
        chunk: compressedBase64,
        chunkIndex: '0',
        totalChunks: '1'
      });
      await fetch(WEBAPP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      });
      hideOverlay();
      setStatus('✅ ส่ง Settlement สำเร็จแล้วครับ', 'success');
      setTimeout(() => liff.closeWindow(), 2000);
    } catch(err) {
      hideOverlay();
      setStatus('❌ ' + err.message, 'error');
      document.getElementById('btn-upload').disabled = false;
    }
  }

  async function confirmNoSettlement() {
    if (!isProfileLoaded) return;
    if (!confirm('ยืนยันว่าไม่มี Settlement วันนี้?')) return;
    showOverlay('กำลังบันทึก...');
    try {
      const body = new URLSearchParams({
        action: 'noSettlement',
        branchId: branchId || '',
        userId: userId || '',
        displayName: displayName || ''
      });
      await fetch(WEBAPP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      });
      hideOverlay();
      setStatus('✅ บันทึกแล้วครับ ไม่มี Settlement วันนี้', 'success');
      setTimeout(() => liff.closeWindow(), 2000);
    } catch(err) {
      hideOverlay();
      setStatus('❌ เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
    }
  }

  function setBodyError(msg) {
    document.getElementById('user-name').textContent = 'เกิดข้อผิดพลาด';
    document.getElementById('user-avatar').textContent = '⚠️';
    document.getElementById('user-avatar').classList.remove('loading');
    const body = document.getElementById('body-content');
    body.insertAdjacentHTML('beforeend', `<div class="status show error">${msg}</div>`);
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'status' + (msg ? ' show ' + type : '');
  }
  function showOverlay(text) {
    document.getElementById('overlay-text').textContent = text;
    document.getElementById('overlay').classList.add('show');
  }
  function hideOverlay() {
    document.getElementById('overlay').classList.remove('show');
  }

  init();
</script>
</body>
</html>
